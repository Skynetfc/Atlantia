name: Treaty Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'atlas-core/**'
      - 'package.json'
      - '**/*.md'
  schedule:
    - cron: '0 7 * * 1'  # Weekly, Monday 07:00 UTC

jobs:
  treaty-compliance:
    runs-on: ubuntu-latest
    name: Ruflo attribution and lock-in compliance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Ruflo stays in optionalDependencies
        run: |
          python3 - <<'PYEOF'
          import json, sys
          pkg = json.load(open('package.json'))
          deps = pkg.get('dependencies', {})
          ruflo_in_deps = [k for k in deps if 'ruflo' in k.lower() or 'claude-flow' in k.lower()]
          if ruflo_in_deps:
              print(f"TREATY VIOLATION: Ruflo packages moved to dependencies: {ruflo_in_deps}")
              print("Ruflo must remain in optionalDependencies (prompt1.md Section 3.4, Constitution treaty)")
              sys.exit(1)
          print("PASS: Ruflo dependency hygiene — optionalDependencies only")
          PYEOF

      - name: Scan for attribution violations in changed files
        run: |
          python3 - <<'PYEOF'
          import subprocess, sys, re, os

          # Get list of changed files
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
              capture_output=True, text=True
          )
          changed_files = [f for f in result.stdout.strip().split('\n') if f.endswith('.md') or f.endswith('.json') or f.endswith('.sh')]

          # Ruflo capabilities that must be attributed to Ruflo, not Atlantia
          ruflo_capabilities = [
              'swarm coordination', 'swarm orchestration', 'swarm engine',
              'persistent memory', 'multi-agent runtime', 'agent federation',
              '3-tier model routing', 'MCP tools', 'AgentDB',
              'RuVector', 'model routing', 'cost-aware routing'
          ]

          # Attribution patterns: describe as Atlantia's own without crediting Ruflo
          attribution_patterns = [
              re.compile(r"Atlantia(?:'s)?\s+(?:own\s+)?(?:multi-agent\s+runtime|swarm|persistent\s+memory|model\s+routing)", re.IGNORECASE),
              re.compile(r"we\s+built\s+(?:the\s+)?(?:runtime|swarm|orchestrat)", re.IGNORECASE),
              re.compile(r"Atlantia\s+(?:provides|offers|includes)\s+(?:swarm|orchestrat|persistent\s+memory)", re.IGNORECASE),
          ]

          violations = []
          for filepath in changed_files:
              if not os.path.isfile(filepath):
                  continue
              try:
                  content = open(filepath).read()
                  for i, line in enumerate(content.split('\n'), 1):
                      for pattern in attribution_patterns:
                          if pattern.search(line):
                              violations.append(f"{filepath}:{i}: {line.strip()[:120]}")
              except Exception:
                  pass

          if violations:
              print("TREATY VIOLATION: Potential attribution issues found:")
              for v in violations:
                  print(f"  {v}")
              print("\nRuflo's runtime capabilities must be attributed to Ruflo, not Atlantia.")
              print("See constitution.md Section 7.1 and prompt1.md Section 1.2.")
              sys.exit(1)
          print(f"PASS: No attribution violations in {len(changed_files)} changed files")
          PYEOF

      - name: Run no-ruflo smoke test on atlas-core changes
        if: contains(github.event.head_commit.modified, 'atlas-core')
        run: |
          bash scripts/build-atlas-core.sh --dry-run
          echo "PASS: atlas-core build dry-run succeeded without Ruflo"

      - name: Verify NOTICE file credits Ruflo
        run: |
          [[ -f NOTICE ]] || { echo "FAIL: NOTICE file missing"; exit 1; }
          grep -i "ruflo" NOTICE || { echo "FAIL: NOTICE does not credit Ruflo"; exit 1; }
          echo "PASS: NOTICE file credits Ruflo"

      - name: Generate quarterly compliance summary (on schedule only)
        if: github.event_name == 'schedule'
        run: |
          DATE=$(date -u +%Y-%m-%d)
          QUARTER=$(python3 -c "from datetime import date; d=date.today(); print(f'Q{(d.month-1)//3+1} {d.year}')")
          cat > /tmp/treaty-report.md <<EOF
          # Atlantia Treaty Compliance Report — $QUARTER

          Generated: $DATE

          ## Attribution Compliance
          Automated scan passed on scheduled run.

          ## Dependency Hygiene
          Ruflo packages: optionalDependencies only. PASS.

          ## No-Lock-In Smoke Test
          Atlantia persona library is installable and functional without Ruflo.

          ## Verdict: Compliant
          _Next scheduled report: next quarter_
          EOF
          echo "Treaty Compliance Report generated for $QUARTER"
          cat /tmp/treaty-report.md
